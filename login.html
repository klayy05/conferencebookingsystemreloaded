<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATC Meeting Room Booking - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo-wrap">
                <img src="assets/gnpc_logo.jpg" alt="GNPC logo" class="login-logo">
            </div>
            <h2>Employee Sign In</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="user@example.com" data-translate-placeholder="Email Address" required>
                    <small class="field-hint">
                        Use your company email address (@gnpcghana.com)
                    </small>
                </div>
                <div class="form-group password-field">
                    <label for="password">Password</label>
                    <div class="password-input-wrap">
                        <input type="password" id="password" class="password-input" placeholder="Enter your password" data-translate-placeholder="Password" required>
                        <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
                    </div>
                    <small class="field-hint">
                        Min 8 chars, uppercase, lowercase, number, special char (@$!%*?&)
                    </small>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
                <div id="errorMsg" class="error-msg"></div>
            </form>
            <p class="login-back-link"><a href="index.html">Back to homepage</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
